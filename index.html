const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function open(pw) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(SALT), iterations:300000, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(IV)}, key, b64(CT));
  localStorage.setItem("go_pw", pw);
  document.open(); document.write(new TextDecoder().decode(plain)); document.close();
}
document.getElementById("f").addEventListener("submit", async e => {
  e.preventDefault();
  try { await open(document.getElementById("pw").value); }
  catch { document.getElementById("err").textContent = "Wrong password."; localStorage.removeItem("go_pw"); }
});
const saved = localStorage.getItem("go_pw");
if (saved) open(saved).catch(() => localStorage.removeItem("go_pw"));
